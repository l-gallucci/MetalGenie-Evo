name: metalgenie-evo
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # ── Core pipeline ───────────────────────────────────────────────────────────
  - python>=3.8
  - hmmer>=3.3
  - pyrodigal>=3.0
  - pip

  # ── Coverage heatmap (optional, only needed for --bam) ─────────────────────
  - samtools>=1.10

  # ── Visualisation — scripts/plot_heatmap.R (optional) ─────────────────────
  - r-base>=4.1
  - r-pheatmap
  - r-plotly
  - r-htmlwidgets
  - r-optparse
  - r-rcolorbrewer
  - r-scales

  # ── MetalGenie-Evo Python package ──────────────────────────────────────────
  - pip:
    - -e .
